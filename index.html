<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Pattern Matrix</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            /* Themeable colors */
            --primary-color: #2dd4a8;
            --secondary-color: #1a8c6f;
            --success-color: #2dd4a8;
            --failure-color: #ff4444;
            --warning-color: #fbbf24;
            --background-color: #1e1e1e;
            --background-gradient-1: #0f1e2d;
            --background-gradient-2: #1e3c5a;
            --background-secondary: #001428;
            --background-tertiary: #002038;
            --border-color: #505050;
            --text-color: #e0e0e0;
            --text-secondary-color: #969696;
            --danger-color: #cc0000;
            --safe-color: #22c55e;
            --background-opacity: 0.95;
            --background-gradient-1-alpha: rgba(15, 30, 45, 0.95);
            --background-gradient-2-alpha: rgba(30, 60, 90, 0.95);
            --background-secondary-alpha: rgba(0, 20, 40, 0.95);
            --background-tertiary-alpha: rgba(0, 32, 56, 0.95);
            
            /* Minigame specific colors */
            --minigame-color-1: #273cfcff;
            --minigame-color-2: #2add57ff;
            --minigame-color-3: #28e757ff;
            --minigame-color-4: #edeb64ff;
            --minigame-color-5: #eb87deff;
            
            /* Legacy variables for compatibility */
            --neon-blue: var(--primary-color);
            --light-blue: var(--primary-color);
            --dark-blue: var(--background-gradient-1);
            --dark-bg: var(--background-gradient-1);
            --safe-zone: var(--safe-color);
            --glow: rgba(45, 212, 168, 0.7);
            --glow-color: var(--primary-color);
            --background: var(--background-color);
            --text: var(--text-color);
        }

        html, body {
            background: #11141a !important;
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }
        
        body::before, body::after {
            display: none !important;
            content: none !important;
        }

        /* Web Interface Setup Panel - Centered Layout */
        .standalone-control-deck {
            background: rgba(0, 20, 40, 0.9);
            border: 1px solid var(--primary-color);
            padding: 25px;
            border-radius: 8px;
            width: 500px;
            box-shadow: 0 0 25px rgba(45, 212, 168, 0.25);
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        .deck-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px dashed rgba(45, 212, 168, 0.3);
            padding-bottom: 8px;
            text-align: center;
        }
        .settings-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            text-align: left;
        }
        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .setting-item label {
            font-size: 12px;
            color: var(--text-secondary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .setting-item input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #fff;
            padding: 8px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .setting-item input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 5px rgba(45, 212, 168, 0.3);
        }
        .launch-btn-container {
            text-align: center;
        }
        .standalone-control-deck button {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 14px 32px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .standalone-control-deck button:hover {
            background: var(--secondary-color);
            color: #fff;
        }
        .standalone-control-deck button:active {
            transform: scale(0.98);
        }

        /* Memory Game Container */
        #memory-container {
            background: linear-gradient(135deg, var(--background-gradient-1-alpha) 0%, var(--background-gradient-2-alpha) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            width: 600px;
            padding: 20px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            display: none;
        }

        .memory-display {
            position: relative;
            height: 450px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .memory-splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--light-blue);
            text-transform: uppercase;
        }

        .memory-icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--glow);
        }

        .memory-text {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--glow);
            animation: textPulse 2s infinite;
        }
        
        .phase-alert {
            font-size: 28px;
            color: var(--warning-color);
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.6);
            margin-top: 15px;
            display: none;
        }

        .memory-grid {
            display: none;
            width: 400px;
            height: 400px;
            margin: 0 auto;
            gap: 8px;
        }

        .memory-square {
            background: rgba(0, 40, 80, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .memory-square::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .memory-square:hover::before {
            transform: translateX(100%);
        }

        .memory-square:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 60, 120, 0.5);
            transform: scale(1.02);
        }

        .memory-square.lit {
            background: linear-gradient(135deg, var(--light-blue), var(--neon-blue));
            border-color: white;
            box-shadow: 0 0 20px var(--glow);
            animation: memoryPulse 0.5s ease-in-out;
        }

        .memory-square.player-selected {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--light-blue);
            box-shadow: 0 0 10px var(--glow);
        }

        .memory-square.correct {
            background: linear-gradient(135deg, var(--success-color), var(--safe-color)) !important;
            border-color: var(--success-color);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.7) !important;
            animation: correctPulse 0.6s ease-in-out;
        }

        .memory-square.wrong {
            background: linear-gradient(135deg, var(--failure-color), var(--danger-color)) !important;
            border-color: var(--failure-color);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.7) !important;
            animation: wrongShake 0.6s ease-in-out;
        }

        .timer-container {
            position: relative;
            height: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .memory-timer-progress {
            height: 100%;
            background: linear-gradient(to right, var(--light-blue), var(--neon-blue));
            width: 100%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--glow);
        }
        
        .memory-timer-progress.input-phase-color {
            background: linear-gradient(to right, var(--warning-color), #f59e0b) !important;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.7) !important;
        }

        .timer-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .hack-title h2 {
            margin-top: 0;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--glow);
        }

        .blink {
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        @keyframes textPulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @keyframes memoryPulse {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--glow); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px var(--glow); }
            100% { transform: scale(1); box-shadow: 0 0 20px var(--glow); }
        }

        @keyframes correctPulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 0, 0.7); }
            50% { transform: scale(1.15); box-shadow: 0 0 40px rgba(0, 255, 0, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 0, 0.7); }
        }

        @keyframes wrongShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- Web Launcher Control Deck with Menu Settings (Centered) -->
    <div class="standalone-control-deck" id="control-deck">
        <div class="deck-title">Matrix Calibration Menu</div>
        <div class="settings-menu">
            <div class="setting-item">
                <label for="cfg-grid-size">Grid Size (e.g. 5 = 5x5)</label>
                <input type="number" id="cfg-grid-size" value="8" min="3" max="8">
            </div>
            <div class="setting-item">
                <label for="cfg-square-count">Target Squares</label>
                <input type="number" id="cfg-square-count" value="8" min="1" max="30">
            </div>
            <div class="setting-item">
                <label for="cfg-rounds">Total Rounds</label>
                <input type="number" id="cfg-rounds" value="3" min="1" max="10">
            </div>
            <div class="setting-item">
                <label for="cfg-show-time">Memorize Time (ms)</label>
                <input type="number" id="cfg-show-time" value="2500" step="500" min="500" max="10000">
            </div>
            <div class="setting-item">
                <label for="cfg-input-time">Input Phase Time (ms)</label>
                <input type="number" id="cfg-input-time" value="5000" step="500" min="1000" max="20000">
            </div>
            <div class="setting-item">
                <label for="cfg-max-wrong">Max Allowed Mistakes</label>
                <input type="number" id="cfg-max-wrong" value="1" min="1" max="10">
            </div>
        </div>
        <div class="launch-btn-container">
            <button onclick="launchWithMenuSettings()">LAUNCH MATRIX</button>
        </div>
    </div>

    <!-- Memory Game Container -->
    <div id="memory-container">
        <div class="memory-display">
            <div class="memory-splash">
                <div class="memory-icon">🧠</div>
                <span class="memory-text" id="splash-status">PREPARING MEMORY MATRIX...</span>
                <div class="phase-alert" id="phase-countdown">MEMORIZE PHASE IN 3...</div>
            </div>
            <div class="memory-grid"></div>
        </div>

        <div class="hack-info">
            <div class="counter">ROUND: <span id="memory-round-current">1</span>/<span id="memory-round-total">3</span></div>
            <div class="message"><span id="memory-message">Calibrating system...</span></div>
        </div>
        
        <div class="timer-container">
            <div class="memory-timer-progress"></div>
            <div class="timer-text">Time: <span id="memory-timer">3.0</span>s</div>
        </div>
    </div>    

    <!-- Audio Placeholders -->
    <div class="audio-elements" style="display: none;">
        <audio id="sound-click" preload="auto"><source src="" type="audio/mpeg"></audio>
        <audio id="sound-success" preload="auto"><source src="" type="audio/mpeg"></audio>
        <audio id="sound-failure" preload="auto"><source src="" type="audio/mpeg"></audio>
        <audio id="sound-buttonPress" preload="auto"><source src="" type="audio/mpeg"></audio>
    </div>

    <script>
        const memoryGameState = {
            config: {
                gridSize: 5,
                squareCount: 8,
                rounds: 3,
                showTime: 3000,
                maxWrongPresses: 3,
                inputTime: 5000
            },
            currentRound: 0,
            wrongPresses: 0,
            gameStarted: false,
            gameActive: false,
            showingPattern: false,
            selectedSquares: [],
            playerSelected: [],
            timerInterval: null,
            showTimer: null
        };

        function launchWithMenuSettings() {
            const runtimeConfig = {
                gridSize: parseInt($('#cfg-grid-size').val()) || 5,
                squareCount: parseInt($('#cfg-square-count').val()) || 8,
                rounds: parseInt($('#cfg-rounds').val()) || 3,
                showTime: parseInt($('#cfg-show-time').val()) || 3000,
                inputTime: parseInt($('#cfg-input-time').val()) || 5000,
                maxWrongPresses: parseInt($('#cfg-max-wrong').val()) || 3
            };
            
            $('#control-deck').hide();
            startMemoryGame(runtimeConfig);
        }

        function startMemoryGame(config = {}) {
            console.log('Initializing Memory Game');
            
            if (memoryGameState.timerInterval) {
                clearInterval(memoryGameState.timerInterval);
                memoryGameState.timerInterval = null;
            }
            if (memoryGameState.showTimer) {
                clearTimeout(memoryGameState.showTimer);
                memoryGameState.showTimer = null;
            }
            
            memoryGameState.config = { ...memoryGameState.config, ...config };
            memoryGameState.currentRound = 0;
            memoryGameState.wrongPresses = 0;
            memoryGameState.gameStarted = false;
            memoryGameState.gameActive = false;
            memoryGameState.showingPattern = false;
            memoryGameState.selectedSquares = [];
            memoryGameState.playerSelected = [];
            
            $('#memory-container').show();
            $('.memory-grid').hide();
            $('.memory-splash').show();
            $('#phase-countdown').hide();
            $('#splash-status').text("PREPARING MEMORY MATRIX...").show();
            
            updateMemoryUI();
            
            runMemorizePhaseCountdown(3, () => {
                $('.memory-splash').fadeOut(400, () => {
                    initializeMemoryGrid();
                    $('.memory-grid').fadeIn(400, () => {
                        startMemoryRound();
                    });
                });
            });
        }

        function runMemorizePhaseCountdown(seconds, callback) {
            $('#splash-status').hide();
            const $countdown = $('#phase-countdown');
            $countdown.text(`MEMORIZE PHASE IN ${seconds}...`).show();
            playMemorySound('click');

            const interval = setInterval(() => {
                seconds--;
                if (seconds > 0) {
                    $countdown.text(`MEMORIZE PHASE IN ${seconds}...`);
                    playMemorySound('click');
                } else {
                    clearInterval(interval);
                    callback();
                }
            }, 1000);
        }

        function updateMemoryUI() {
            $('#memory-round-current').text(memoryGameState.currentRound + 1);
            $('#memory-round-total').text(memoryGameState.config.rounds);
            $('#memory-message').text(`System Ready (Mistakes: ${memoryGameState.wrongPresses}/${memoryGameState.config.maxWrongPresses})`);
        }

        function initializeMemoryGrid() {
            console.log('Initializing memory grid');
            
            const gridContainer = $('.memory-grid');
            gridContainer.empty();
            
            const gridSize = memoryGameState.config.gridSize;
            gridContainer.css({
                'display': 'grid',
                'grid-template-columns': `repeat(${gridSize}, 1fr)`,
                'grid-template-rows': `repeat(${gridSize}, 1fr)`,
                'gap': '8px',
                'width': '400px',
                'height': '400px',
                'margin': '0 auto'
            });
            
            for (let i = 0; i < gridSize * gridSize; i++) {
                const square = $('<div>')
                    .addClass('memory-square')
                    .attr('data-index', i)
                    .on('click', handleMemorySquareClick);
                
                gridContainer.append(square);
            }
            
            memoryGameState.gameStarted = true;
        }

        function startMemoryRound() {
            console.log(`Starting round ${memoryGameState.currentRound + 1}`);
            
            memoryGameState.showingPattern = true;
            memoryGameState.gameActive = false;
            memoryGameState.playerSelected = [];
            
            $('.memory-square').removeClass('lit player-selected correct wrong');
            $('.memory-timer-progress').removeClass('input-phase-color');
            
            const totalSquares = memoryGameState.config.gridSize * memoryGameState.config.gridSize;
            const squareCount = Math.min(memoryGameState.config.squareCount, totalSquares);
            
            memoryGameState.selectedSquares = [];
            while (memoryGameState.selectedSquares.length < squareCount) {
                const randomIndex = Math.floor(Math.random() * totalSquares);
                if (!memoryGameState.selectedSquares.includes(randomIndex)) {
                    memoryGameState.selectedSquares.push(randomIndex);
                }
            }
            
            console.log('Selected squares:', memoryGameState.selectedSquares);
            
            memoryGameState.selectedSquares.forEach(index => {
                $(`.memory-square[data-index="${index}"]`).addClass('lit');
            });
            $('#memory-message').text(`MEMORIZE PHASE ACTIVE: Note the lit array pattern.`);
            
            let remainingTime = memoryGameState.config.showTime;
            updateMemoryTimer(remainingTime, memoryGameState.config.showTime);
            
            memoryGameState.showTimer = setTimeout(() => {
                startInputPhase();
            }, memoryGameState.config.showTime);
            
            memoryGameState.timerInterval = setInterval(() => {
                remainingTime -= 100;
                updateMemoryTimer(remainingTime, memoryGameState.config.showTime);
                
                if (remainingTime <= 0) {
                    clearInterval(memoryGameState.timerInterval);
                    memoryGameState.timerInterval = null;
                }
            }, 100);
        }

        function updateMemoryTimer(timeMs, totalDuration) {
            const progress = Math.max(0, timeMs / totalDuration) * 100;
            $('.memory-timer-progress').css('width', `${progress}%`);
            $('#memory-timer').text((timeMs / 1000).toFixed(1));
        }

        function startInputPhase() {
            console.log('Starting Input Phase countdown window');
            
            memoryGameState.showingPattern = false;
            memoryGameState.gameActive = true;
            $('.memory-square').removeClass('lit');
            $('.memory-timer-progress').addClass('input-phase-color');
            
            const displaySecs = (memoryGameState.config.inputTime / 1000).toFixed(1);
            $('#memory-message').text(`INPUT PHASE ACTIVE: Select items within ${displaySecs} seconds!`);
            
            if (memoryGameState.timerInterval) {
                clearInterval(memoryGameState.timerInterval);
            }
            
            let remainingInputTime = memoryGameState.config.inputTime;
            updateMemoryTimer(remainingInputTime, memoryGameState.config.inputTime);
            
            memoryGameState.timerInterval = setInterval(() => {
                remainingInputTime -= 100;
                updateMemoryTimer(remainingInputTime, memoryGameState.config.inputTime);
                
                if (remainingInputTime <= 0) {
                    clearInterval(memoryGameState.timerInterval);
                    memoryGameState.timerInterval = null;
                    console.log('Input phase time expired!');
                    endMemoryGame(false);
                }
            }, 100);
        }

        function handleMemorySquareClick() {
            if (!memoryGameState.gameActive || memoryGameState.showingPattern) {
                return;
            }
            
            const squareIndex = parseInt($(this).attr('data-index'));
            console.log('Square clicked:', squareIndex);
            
            if (memoryGameState.playerSelected.includes(squareIndex)) {
                return;
            }
            
            memoryGameState.playerSelected.push(squareIndex);
            $(this).addClass('player-selected');
            
            playMemorySound('click');
            if (memoryGameState.selectedSquares.includes(squareIndex)) {
                $(this).addClass('correct');
                console.log('Correct square selected');
            } else {
                $(this).addClass('wrong');
                console.log('Wrong square selected');
                memoryGameState.wrongPresses++;
                
                $('#memory-message').text(`Incorrect selection! (${memoryGameState.wrongPresses}/${memoryGameState.config.maxWrongPresses})`);
                
                if (memoryGameState.wrongPresses >= memoryGameState.config.maxWrongPresses) {
                    endMemoryGame(false);
                    return;
                }
                
                setTimeout(() => {
                    $(this).removeClass('player-selected wrong');
                    memoryGameState.playerSelected.pop();
                }, 1000);
                
                return;
            }
            
            if (memoryGameState.playerSelected.length === memoryGameState.selectedSquares.length) {
                const allCorrect = memoryGameState.selectedSquares.every(square => 
                    memoryGameState.playerSelected.includes(square)
                );
                
                if (allCorrect) {
                    console.log('Round completed successfully');
                    if (memoryGameState.timerInterval) {
                        clearInterval(memoryGameState.timerInterval);
                        memoryGameState.timerInterval = null;
                    }
                    
                    memoryGameState.currentRound++;
                    
                    if (memoryGameState.currentRound >= memoryGameState.config.rounds) {
                        endMemoryGame(true);
                    } else {
                        setTimeout(() => {
                            updateMemoryUI();
                            startMemoryRound();
                        }, 1500);
                    }
                } else {
                    endMemoryGame(false);
                }
            }
        }

        function endMemoryGame(success) {
            console.log('Memory game ended. Success:', success);
            
            memoryGameState.gameActive = false;
            memoryGameState.showingPattern = false;
            
            if (memoryGameState.timerInterval) {
                clearInterval(memoryGameState.timerInterval);
                memoryGameState.timerInterval = null;
            }
            if (memoryGameState.showTimer) {
                clearTimeout(memoryGameState.showTimer);
                memoryGameState.showTimer = null;
            }
            
            if (success) {
                $('#memory-message').text('Memory test completed successfully!');
                playMemorySound('success');
            } else {
                $('#memory-message').text('Memory test failed!');
                playMemorySound('failure');
            }
            
            setTimeout(() => {
                $('#memory-container').hide();
                $('#control-deck').fadeIn(300);
                
                if (window.invokeNative && typeof GetParentResourceName === 'function') {
                    fetch(`https://${GetParentResourceName()}/memoryResult`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json; charset=UTF-8',
                        },
                        body: JSON.stringify({
                            success: success
                        })
                    });
                } else {
                    console.log('Memory game result simulated successfully online:', success);
                    // Alerts/Modals removed entirely. Proceeding directly to settings menu.
                }
            }, 2000);
        }

        function playMemorySound(type) {
            try {
                let audio;
                switch (type) {
                    case 'click':
                        audio = document.getElementById('sound-click');
                        break;
                    case 'success':
                        audio = document.getElementById('sound-success');
                        break;
                    case 'failure':
                        audio = document.getElementById('sound-failure');
                        break;
                    default:
                        audio = document.getElementById('sound-buttonPress');
                }
                
                if (audio && audio.src && audio.src !== window.location.href) {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log('Audio play failed:', e));
                }
            } catch (e) {
                console.log('Error playing sound:', e);
            }
        }

        window.addEventListener('message', function(event) {
            if (event.data.action === 'startMemory') {
                $('#control-deck').hide();
                startMemoryGame(event.data.config);
            } else if (event.data.action === 'endMemory') {
                endMemoryGame(false);
            }
        });
    </script>
</body>
</html>
